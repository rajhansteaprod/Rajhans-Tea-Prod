# =============================================================================
# SONARCLOUD CONFIGURATION
# =============================================================================
#
# WHAT IS THIS FILE?
# SonarCloud reads this file to understand your project structure.
# It tells SonarCloud: where is the code, where are the tests,
# where is the coverage report, and what to ignore.
#
# HOW DOES SONARCLOUD WORK?
# 1. Your CI pipeline runs unit tests → generates a coverage report (lcov.info)
# 2. CI then runs the SonarCloud scanner
# 3. Scanner reads your source code + the coverage report
# 4. Sends everything to sonarcloud.io for analysis
# 5. SonarCloud shows a dashboard with: bugs, vulnerabilities, code smells,
#    coverage %, duplications, and a Quality Gate (pass/fail)
#
# QUALITY GATE = SonarCloud's version of a pass/fail threshold.
# If your new code introduces a critical vulnerability → Quality Gate fails →
# CI fails → PR cannot be merged. Like a bouncer for your codebase.
# =============================================================================

# -----------------------------------------------------------------------------
# Project identification
# These must match what you create on sonarcloud.io
# -----------------------------------------------------------------------------
sonar.projectKey=saransh-bairagi_RAJHANS-ECOMMERCE-PROD
sonar.organization=saransh-bairagi

# Human-readable name shown on the SonarCloud dashboard
sonar.projectName=Rajhans Ecommerce
sonar.projectVersion=1.0

# -----------------------------------------------------------------------------
# Source & test directories
# -----------------------------------------------------------------------------
# Tell SonarCloud where your actual source code lives (not tests, not node_modules)
sonar.sources=backend/src

# Tell SonarCloud where your test files live
# SonarCloud treats these differently — test code has relaxed rules
# (e.g. hardcoded strings in tests are fine)
sonar.tests=backend/tests

# File extensions to scan — TypeScript only
sonar.inclusions=**/*.ts

# -----------------------------------------------------------------------------
# Exclusions — files to SKIP during analysis
# -----------------------------------------------------------------------------
# node_modules → third-party code, not your responsibility
# *.d.ts       → TypeScript type declaration files, not real logic
# dist/        → compiled output, analysing this would duplicate src/
sonar.exclusions=**/node_modules/**,**/*.d.ts,**/dist/**

# Tell SonarCloud these are test files (different rule set applies)
sonar.test.inclusions=**/tests/**/*.test.ts

# -----------------------------------------------------------------------------
# Language settings
# -----------------------------------------------------------------------------
sonar.language=ts

# -----------------------------------------------------------------------------
# Coverage report
# -----------------------------------------------------------------------------
# SonarCloud reads the LCOV format coverage report generated by Jest.
# This is the file at backend/coverage/lcov.info after `npm run test:unit`.
#
# WHAT IS LCOV?
# It's a standard format for coverage data — lists every file, every line,
# and whether that line was executed during tests. SonarCloud reads this
# and shows coverage % per file on the dashboard.
sonar.javascript.lcov.reportPaths=backend/coverage/lcov.info

# -----------------------------------------------------------------------------
# Encoding
# -----------------------------------------------------------------------------
sonar.sourceEncoding=UTF-8
