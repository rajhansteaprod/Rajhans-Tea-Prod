name: Build & Deploy to Docker Hub & Hostinger

on:
  push:
    branches:
      - master

env:
  DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
  DOCKER_PASSWORD: ${{ secrets.DOCKER_PASSWORD }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push Backend image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./backend/Dockerfile
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/rajhans-tea-backend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push Frontend image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./frontend/Dockerfile
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/rajhans-tea-frontend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Trigger Hostinger Deployment
        if: success()
        run: |
          curl -X POST ${{ secrets.HOSTINGER_WEBHOOK_URL }} \
            -H "Authorization: Bearer ${{ secrets.HOSTINGER_WEBHOOK_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d '{
              "event": "deploy",
              "backend_image": "${{ secrets.DOCKER_USERNAME }}/rajhans-tea-backend:latest",
              "frontend_image": "${{ secrets.DOCKER_USERNAME }}/rajhans-tea-frontend:latest"
            }'

      - name: Deployment Complete
        run: echo "✅ Images pushed to Docker Hub and Hostinger webhook triggered!"
