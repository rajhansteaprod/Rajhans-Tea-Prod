upstream backend {
    server backend:3000;
    keepalive 32;
}

upstream frontend {
    server frontend:4200;
}

# Proxy cache zone (10MB keys, 100MB storage)
proxy_cache_path /tmp/nginx-cache levels=1:2 keys_zone=api_cache:10m max_size=100m inactive=10m;

server {
    listen 80;
    server_name localhost;

    # ─── Compression ─────────────────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_min_length 256;
    gzip_comp_level 4;
    gzip_types text/plain application/json application/javascript text/css text/xml application/xml image/svg+xml;

    client_max_body_size 10m;

    # ─── Security Headers ────────────────────────────────────────────────
    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options SAMEORIGIN always;

    # ─── API proxy (with keepalive + buffering) ──────────────────────────
    location /api {
        proxy_pass http://backend;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Request-ID $request_id;

        # Proxy buffering for faster response to client
        proxy_buffering on;
        proxy_buffer_size 8k;
        proxy_buffers 8 8k;

        # Timeouts
        proxy_connect_timeout 10s;
        proxy_read_timeout 30s;
        proxy_send_timeout 30s;
    }

    # ─── WebSocket — Socket.io ───────────────────────────────────────────
    location /socket.io {
        proxy_pass http://backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }

    # ─── Uploaded files (cached 7 days, immutable) ───────────────────────
    location /uploads {
        proxy_pass http://backend;
        proxy_set_header Host $host;

        # Browser cache: 7 days (images rarely change after upload)
        expires 7d;
        add_header Cache-Control "public, immutable";
        add_header X-Content-Type-Options nosniff;
    }

    # ─── Metrics (restrict in production) ────────────────────────────────
    location /metrics {
        proxy_pass http://backend;
    }

    # ─── Frontend ────────────────────────────────────────────────────────
    location / {
        proxy_pass http://frontend;
        proxy_set_header Host $host;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}
