services:
  backend:
    image: rajhansteaprod/rajhans-tea-backend:latest
    pull_policy: always
    container_name: tea-backend
    ports:
      - "3000:3000"
    env_file: .env
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - tea-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  frontend:
    image: rajhansteaprod/rajhans-tea-frontend:latest
    pull_policy: always
    container_name: tea-frontend
    ports:
      - "80:80"
    restart: unless-stopped
    depends_on:
      - backend
    networks:
      - tea-network

  redis:
    image: redis:7-alpine
    container_name: tea-redis
    ports:
      - "6379:6379"
    restart: unless-stopped
    networks:
      - tea-network
    command: redis-server --requirepass ""
    healthcheck:
      test: ["CMD", "redis-cli", "--raw", "incr", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
    volumes:
      - redis-data:/data

networks:
  tea-network:
    driver: bridge

volumes:
  redis-data:
