services:
  redis:
    image: redis:7-alpine
    container_name: tea-redis
    ports:
      - "6379:6379"
    restart: unless-stopped
    networks:
      - tea-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
    volumes:
      - redis-data:/data

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: tea-backend
    ports:
      - "3000:3000"
    env_file: .env
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      PORT: ${PORT:-3000}
      MONGO_URI: ${MONGO_URI:-mongodb://localhost:27017/rajhans-tea}
      REDIS_HOST: ${REDIS_HOST:-redis}
      REDIS_PORT: ${REDIS_PORT:-6379}
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost}
      # Add more from .env file as needed
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - tea-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    container_name: tea-frontend
    ports:
      - "80:80"
    restart: unless-stopped
    depends_on:
      - backend
    networks:
      - tea-network

networks:
  tea-network:
    driver: bridge

volumes:
  redis-data:
