services:
  mongo:
    image: mongo:7
    container_name: rajhans-ecom-mongo
    restart: unless-stopped
    command: ["mongod", "--replSet", "rs0", "--bind_ip_all"]
    ports:
      - "27019:27017"
    volumes:
      - mongo-data:/data/db
      - ./infrastructure/docker/mongo/mongo-init.js:/docker-entrypoint-initdb.d/mongo-init.js:ro
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  mongo-test:
    image: mongo:7
    container_name: rajhans-ecom-mongo-test
    restart: unless-stopped
    command: ["mongod", "--replSet", "rs0", "--bind_ip_all"]
    ports:
      - "27020:27017"
    volumes:
      - mongo-test-data:/data/db
      - ./infrastructure/docker/mongo/mongo-init.js:/docker-entrypoint-initdb.d/mongo-init.js:ro
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: rajhans-ecom-redis
    restart: unless-stopped
    ports:
      - "6381:6379"
    volumes:
      - redis-data:/data
      - ./infrastructure/docker/redis/redis.conf:/usr/local/etc/redis/redis.conf:ro
    command: ["redis-server", "/usr/local/etc/redis/redis.conf"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile.dev
    container_name: rajhans-ecom-backend
    restart: unless-stopped
    ports:
      - "3100:3000"
      - "9229:9229"
    environment:
      - NODE_ENV=development
      - PORT=3000
      - MONGO_URI=mongodb://mongo:27017/rajhans-ecommerce?replicaSet=rs0
      - MONGO_TEST_URI=mongodb://mongo-test:27017/rajhans-ecommerce-test?replicaSet=rs0
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - JWT_ACCESS_SECRET=dev-access-secret-change-me
      - JWT_REFRESH_SECRET=dev-refresh-secret-change-me
      - CORS_ORIGIN=http://localhost:4201
      - FIREBASE_PROJECT_ID=sarara-b9eac
      - GOOGLE_APPLICATION_CREDENTIALS=/app/backend/firebase-service-account.json
      - RAZORPAY_KEY_ID=rzp_test_STo8X60gyG9PvZ
      - RAZORPAY_KEY_SECRET=F2V1oUFcvc6vcvbu4OP0ezur
      - RAZORPAY_WEBHOOK_SECRET=
    depends_on:
      mongo:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend/src:/app/backend/src
      - ./backend/nodemon.json:/app/backend/nodemon.json
      - ./backend/firebase-service-account.json:/app/backend/firebase-service-account.json:ro
      - ./backend/uploads:/app/backend/uploads

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    container_name: rajhans-ecom-frontend
    restart: unless-stopped
    ports:
      - "4201:4200"
    volumes:
      - ./frontend/src:/app/src
      - ./frontend/angular.json:/app/angular.json
    depends_on:
      - backend

  mongo-express:
    image: mongo-express
    container_name: rajhans-ecom-mongo-express
    restart: unless-stopped
    ports:
      - "8082:8081"
    environment:
      - ME_CONFIG_MONGODB_URL=mongodb://mongo:27017/?replicaSet=rs0
      - ME_CONFIG_BASICAUTH=false
    depends_on:
      mongo:
        condition: service_healthy

  nginx:
    image: nginx:alpine
    container_name: rajhans-ecom-nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./infrastructure/docker/nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend
      - frontend

volumes:
  mongo-data:
  mongo-test-data:
  redis-data:
