<a [routerLink]="'/product/' + product.slug" class="card" [class.horizontal]="layout === 'horizontal'">
  <div class="card__img-wrap">
    @if (product.images?.[0]) {
      <img [src]="product.images[0]" [alt]="product.name" loading="lazy" class="card__img" />
    } @else {
      <div class="card__img-placeholder">
        <svg width="32" height="32" viewBox="0 0 24 24" fill="none"><rect x="3" y="3" width="18" height="18" rx="2" stroke="currentColor" stroke-width="1.5"/><circle cx="8.5" cy="8.5" r="1.5" fill="currentColor"/><path d="M21 15l-5-5L5 21" stroke="currentColor" stroke-width="1.5"/></svg>
      </div>
    }
    <!-- Quick-add icon (Kusmi style — circle button bottom-right) -->
    <button class="card__quick-add" (click)="onAddToCart($event)" aria-label="Add to cart">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none"><path d="M6 2L3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round"/><line x1="3" y1="6" x2="21" y2="6" stroke="currentColor" stroke-width="1.5"/><path d="M16 10a4 4 0 0 1-8 0" stroke="currentColor" stroke-width="1.5"/></svg>
    </button>
    @if (product.isFeatured) {
      <span class="card__badge">FEATURED</span>
    }
  </div>
  <div class="card__body">
    <h3 class="card__name">{{ product.name }}</h3>
    <span class="card__attr">{{ product.category?.name || 'Tea' }} &middot; CTC &middot; Premium</span>
    <span class="card__price">&#8377;{{ product.basePrice }}</span>
  </div>
</a>
