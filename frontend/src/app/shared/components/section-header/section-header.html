<div class="sh" [class.sh--center]="align === 'center'" [class.sh--right]="align === 'right'">
  @if (eyebrow) {
    <span class="sh__eyebrow">{{ eyebrow }}</span>
  }
  <h2 class="sh__headline">{{ headline }}</h2>
  @if (subtitle) {
    <p class="sh__subtitle">{{ subtitle }}</p>
  }
  @if (ctaText && ctaLink) {
    <a [routerLink]="ctaLink" class="sh__cta">
      {{ ctaText }}
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none"><path d="M5 12h14M12 5l7 7-7 7" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
    </a>
  }
</div>
