<footer class="footer">
  <!-- Newsletter row — Mariage Frères style -->
  <div class="footer-newsletter">
    <div class="footer-newsletter-inner">
      <h3 class="footer-newsletter-heading">Continue the Experience</h3>
      <p class="footer-newsletter-sub">Receive our newsletter and benefit from exclusive advantages</p>
      <form class="footer-newsletter-form" (ngSubmit)="onNewsletterSubmit($event)">
        <input
          type="email"
          class="footer-email-input"
          placeholder="Enter your email address"
          [(ngModel)]="newsletterEmail"
          name="email"
          [disabled]="newsletterLoading()"
          required
        />
        <button
          type="submit"
          class="footer-signup-btn"
          [disabled]="newsletterLoading() || !newsletterEmail()"
        >
          {{ newsletterLoading() ? 'Subscribing...' : 'Subscribe' }}
        </button>
      </form>

      <!-- Validation Message -->
      @if (newsletterMessage()) {
        <div [class.footer-message-success]="!newsletterError()" [class.footer-message-error]="newsletterError()" class="footer-message">
          {{ newsletterMessage() }}
        </div>
      }

      <div class="footer-social">
        <a href="#" class="footer-social-link" aria-label="Instagram">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none"><rect x="2" y="2" width="20" height="20" rx="5" stroke="currentColor" stroke-width="1.5"/><circle cx="12" cy="12" r="5" stroke="currentColor" stroke-width="1.5"/><circle cx="17.5" cy="6.5" r="1.5" fill="currentColor"/></svg>
        </a>
        <a href="#" class="footer-social-link" aria-label="Facebook">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none"><path d="M18 2h-3a5 5 0 0 0-5 5v3H7v4h3v8h4v-8h3l1-4h-4V7a1 1 0 0 1 1-1h3z" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </a>
        <a href="#" class="footer-social-link" aria-label="Twitter">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none"><path d="M23 3a10.9 10.9 0 0 1-3.14 1.53 4.48 4.48 0 0 0-7.86 3v1A10.66 10.66 0 0 1 3 4s-4 9 5 13a11.64 11.64 0 0 1-7 2c9 5 20 0 20-11.5a4.5 4.5 0 0 0-.08-.83A7.72 7.72 0 0 0 23 3z" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </a>
      </div>
    </div>
  </div>

  <!-- Ornamental Divider -->
  <div class="footer-ornament">
    <span></span>
  </div>

  <!-- Massive brand name -->
  <div class="footer-brand">
    <h2 class="footer-brand-name">RAJHANS TEA</h2>
  </div>

  <!-- Nav links row -->
  <div class="footer-nav">
    <div class="footer-nav-left">
      <a routerLink="/products">SHOP</a>
      <a routerLink="/page/about-us">OUR STORY</a>
      <a routerLink="/page/blog">ABOUT</a>
      <a routerLink="/page/contact-us">CONTACT</a>
    </div>
    <div class="footer-nav-right">
      <a routerLink="/page/terms-and-conditions">TERMS</a>
      <a routerLink="/page/privacy-policy">PRIVACY</a>
      <a routerLink="/page/shipping-policy">FAQ</a>
    </div>
  </div>

  <!-- Copyright -->
  <div class="footer-copyright">
    <span>&copy; 2026 RAJHANS TEA. All rights reserved.</span>
  </div>
</footer>
