<div class="account">
  <!-- Header -->
  <div class="account__header">
    <div>
      <h1 class="account__title">Your Account</h1>
      <p class="account__subtitle">
        {{ userName() }}@if (userEmail()) {, Email: {{ userEmail() }}}
      </p>
    </div>
    @if (isAdmin()) {
      <a routerLink="/admin" class="account__admin-btn">Admin Panel →</a>
    }
  </div>


  <div class="account__layout">
    <!-- Sidebar -->
    <aside class="account__sidebar">
      <div class="account__nav-scroll">
        @for (item of sidebarItems(); track item.route) {
          <a
            [routerLink]="item.route"
            routerLinkActive="active"
            [routerLinkActiveOptions]="{ exact: item.route === '/dashboard' }"
            class="account__nav-item"
          >
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" [innerHTML]="trustSvg(item.icon)"></svg>
            <span>{{ item.label }}</span>
          </a>
        }

        <a routerLink="/page/contact-us" class="account__nav-item">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
          <span>Customer Support</span>
        </a>
      </div>
    </aside>

    <!-- Content -->
    <main class="account__content">
      <router-outlet />
    </main>
  </div>

  <!-- Logout Button at Bottom -->
  <button class="account__logout-bottom" (click)="signOut()">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4M16 17l5-5-5-5M21 12H9" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
    Log Out
  </button>
</div>
