<div class="account">
  <!-- Header -->
  <div class="account__header">
    <div>
      <h1 class="account__title">Your Account</h1>
      <p class="account__subtitle">
        {{ userName() }}@if (userEmail()) {, Email: {{ userEmail() }}}
      </p>
    </div>
    @if (isAdmin()) {
      <a routerLink="/admin" class="account__admin-btn">Admin Panel →</a>
    }
  </div>

  <!-- Mobile menu toggle -->
  <button class="account__mobile-toggle" (click)="toggleMobileMenu()">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none"><path d="M3 12h18M3 6h18M3 18h18" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
    Menu
  </button>

  <div class="account__layout">
    <!-- Sidebar -->
    <aside class="account__sidebar" [class.open]="mobileMenuOpen()">
      @for (item of sidebarItems(); track item.route) {
        <a
          [routerLink]="item.route"
          routerLinkActive="active"
          [routerLinkActiveOptions]="{ exact: item.route === '/dashboard' }"
          class="account__nav-item"
          (click)="closeMobileMenu()"
        >
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" [innerHTML]="trustSvg(item.icon)"></svg>
          {{ item.label }}
        </a>
      }

      <div class="account__nav-divider"></div>

      <a routerLink="/page/contact-us" class="account__nav-item" (click)="closeMobileMenu()">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
        Customer Support
      </a>

      <button class="account__nav-item account__nav-item--logout" (click)="signOut()">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4M16 17l5-5-5-5M21 12H9" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
        Log Out
      </button>
    </aside>

    <!-- Content -->
    <main class="account__content">
      <router-outlet />
    </main>
  </div>
</div>
