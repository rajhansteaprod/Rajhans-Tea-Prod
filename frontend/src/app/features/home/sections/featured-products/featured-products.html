@if (!loading()) {
  <section class="fp">
    <!-- Header row -->
    <div class="fp__header">
      <h2 class="fp__title">Featured</h2>
      @if (showArrows()) {
        <div class="fp__arrows">
          <button class="fp__arrow" (click)="prev()" [disabled]="!canPrev()" aria-label="Previous">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none">
              <path d="M15 18l-6-6 6-6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </button>
          <button class="fp__arrow" (click)="next()" [disabled]="!canNext()" aria-label="Next">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none">
              <path d="M9 18l6-6-6-6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </button>
        </div>
      }
    </div>

    <!-- Product cards -->
    <div class="fp__viewport"
      (mousedown)="onMouseDown($event)"
      (mousemove)="onMouseMove($event)"
      (mouseup)="onMouseUp()"
      (mouseleave)="onMouseUp()"
      (touchstart)="onTouchStart($event)"
      (touchmove)="onTouchMove($event)"
      (touchend)="onTouchEnd()">
      <div class="fp__track" [style.transform]="'translateX(' + (-currentIndex() * 100 / 3) + '%)'">
        @for (p of products(); track p._id) {
          <div class="fp__item">
            <app-product-card [product]="p" variant="default" />
          </div>
        }
      </div>
    </div>
  </section>
}
