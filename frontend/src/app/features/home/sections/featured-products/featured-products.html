@if (products().length > 0) {
  <section class="featured">
    <!-- Header -->
    <div class="featured__header">
      <h2 class="featured__title">Featured Products</h2>
      <p class="featured__subtitle">Discover our handpicked selection of premium teas</p>
    </div>

    <!-- Product Grid -->
    <div class="featured__grid">
      @for (product of products(); track product._id) {
        <app-product-card
          [product]="product"
          [isHovering]="isHovering(product._id)"
          [isWishlisted]="isWishlisted(product._id)"
          [getRating]="getRating"
          [getReviewCount]="getReviewCount"
          (imageHover)="setHovering(product._id, $event)"
          (toggleWishlistClick)="toggleWishlist(product, $event)"
          (addToCartClick)="addToCart(product, $event)"
          (buyNowClick)="buyNow(product, $event)"
          (cardClick)="goToProduct(product)"
        />
      }
    </div>
  </section>
}
