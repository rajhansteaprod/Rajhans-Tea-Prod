<section class="gifting">
  <div
    class="gifting__container"
    (mouseenter)="isHovered = true"
    (mouseleave)="isHovered = false"
  >
    <img src="/gift.jpeg" alt="Gifting" class="gifting__image" />

    <!-- Overlay -->
    <div class="gifting__overlay" [class.gifting__overlay--active]="isHovered"></div>

    <!-- CTA Button -->
    <button
      class="gifting__cta"
      [class.gifting__cta--visible]="isHovered"
      (click)="onExplore()"
      aria-label="Explore gifting options"
    >
      Explore
    </button>
  </div>
</section>
