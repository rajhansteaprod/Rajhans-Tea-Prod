<section class="gifting" (mouseenter)="isHovered = true" (mouseleave)="isHovered = false">
  <h2 class="gifting__heading">Perfect Gifts for Tea Lovers</h2>
  <p class="gifting__subheading">Curated collections for every occasion</p>

  <div class="gifting__container">
    <picture>
      <source media="(max-width: 640px)" srcset="/gift.mob.png" />
      <img src="/gift.png" alt="Gifting" class="gifting__image" />
    </picture>

    <!-- Overlay -->
    <div class="gifting__overlay" [class.gifting__overlay--active]="isHovered"></div>

    <!-- CTA Button -->
    <button
      class="gifting__cta"
      [class.gifting__cta--visible]="isHovered"
      (click)="onExplore()"
      aria-label="Explore gifting options"
    >
      Explore
    </button>
  </div>
</section>
