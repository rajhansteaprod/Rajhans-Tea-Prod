<section class="explore" #exploreSection>
  <div class="explore__content" #exploreContent>
    <h2 class="explore__headline">
      <span class="explore__h-line">Explore Our</span>
      <span class="explore__h-line">Collection</span>
    </h2>
    <a routerLink="/products" class="explore__cta" #exploreCta>
      <span>View All Products</span>
      <svg class="explore__cta-arrow" width="20" height="20" viewBox="0 0 24 24" fill="none">
        <path d="M5 12h14M12 5l7 7-7 7" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </a>
  </div>
</section>
