<section class="checkout">
  <!-- Step Indicator -->
  <div class="checkout__steps">
    @for (s of steps; track s.key; let i = $index) {
      <div
        class="checkout__step"
        [class.active]="currentStep() === s.key"
        [class.done]="isStepDone(s.key)"
      >
        <span class="checkout__step-label">{{ s.label }}</span>
      </div>
      @if (i < steps.length - 1) {
        <div class="checkout__step-line" [class.done]="isStepDone(s.key)"></div>
      }
    }
  </div>

  <div class="checkout__layout">
    <!-- Main Panel -->
    <div class="checkout__main">
      <!-- STEP 1: CART -->
      @if (currentStep() === 'cart') {
        <app-cart-step (nextStep)="onCartNext()"></app-cart-step>
      }

      <!-- STEP 2: ADDRESS -->
      @if (currentStep() === 'address') {
        <app-address-step (prevStep)="onAddressPrev()" (nextStep)="onAddressNext()"></app-address-step>
      }

      <!-- STEP 3: SUMMARY -->
      @if (currentStep() === 'summary') {
        <app-summary-step (prevStep)="onSummaryPrev()" (placeOrderClick)="onPlaceOrder()"></app-summary-step>
      }
    </div>
  </div>
</section>
