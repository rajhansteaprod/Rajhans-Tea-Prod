<div class="saved-addresses">
  @if (savedAddresses().length > 0) {
    <div class="saved-addresses__list">
      @for (address of savedAddresses(); track $index; let i = $index) {
        <div class="saved-addresses__card" (click)="selectCurrentAddress(address)">
          <input
            type="radio"
            class="saved-addresses__radio"
            [checked]="selectedAddressIndex() === i"
            (change)="selectedAddressIndex.set(i)"
          />
          <div class="saved-addresses__card-content">
            <span class="saved-addresses__label">{{ address.label }}</span>
            <p class="saved-addresses__address-full">
              {{ address.address }} • {{ address.city }}, {{ address.state }} - {{ address.pinCode }}
            </p>
          </div>
        </div>
      }
    </div>
  }
</div>
