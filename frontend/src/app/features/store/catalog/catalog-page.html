<div class="catalog">
  <!-- Hero -->
  <header class="catalog__hero">
    <div class="catalog__hero-inner">
      <nav class="catalog__breadcrumbs">
        <a routerLink="/">Home</a>
        <span class="catalog__breadcrumbs-sep">/</span>
        <span>{{ categoryName || 'All Products' }}</span>
      </nav>
      <h1 class="catalog__title">{{ categoryName || 'All Products' }}</h1>
      <p class="catalog__count">{{ store.resultCount() }} products</p>
    </div>
  </header>

  <!-- Content -->
  <div class="catalog__content">
    @if (!store.hasResults()) {
      <div class="catalog__empty">
        <p>No products found in this category.</p>
        <app-button variant="primary" size="md" (click)="goToAllProducts()">Browse All Teas</app-button>
      </div>
    } @else {
      <div class="catalog__grid">
        @for (p of store.results(); track p._id) {
          <app-product-card
            [product]="p"
            [isHovering]="isHovering(p._id)"
            [isWishlisted]="isWishlisted(p._id)"
            [getRating]="getRating"
            [getReviewCount]="getReviewCount"
            (imageHover)="setHovering(p._id, $event)"
            (toggleWishlistClick)="toggleWishlist(p, $event)"
            (addToCartClick)="addToCart(p, $event)"
            (buyNowClick)="buyNow(p, $event)"
            (cardClick)="goToProduct(p)"
          />
        }
      </div>
    }
  </div>
</div>
