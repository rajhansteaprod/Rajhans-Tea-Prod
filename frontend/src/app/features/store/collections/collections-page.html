<div class="collections">
  <!-- Hero -->
  <header class="collections__hero">
    <div class="collections__hero-inner">
      <h1 class="collections__title">COLLECTIONS</h1>
      <p class="collections__sub">Curated selections for every palate</p>
    </div>
  </header>

  <!-- Grid -->
  <div class="collections__grid-wrap">
    <div class="collections__grid">
      @for (c of collections(); track c._id) {
        <a [routerLink]="'/collections/' + c.slug" class="collection-card">
          <div class="collection-card__image">
            @if (c.image) {
              <img [src]="c.image" [alt]="c.name" loading="lazy" />
            } @else {
              <div class="collection-card__placeholder">
                <span>{{ c.name[0] }}</span>
              </div>
            }
            <div class="collection-card__overlay">
              <h3 class="collection-card__name">{{ c.name }}</h3>
              @if (c.description) {
                <p class="collection-card__desc">{{ c.description }}</p>
              }
              <span class="collection-card__cta">Explore Collection</span>
            </div>
          </div>
        </a>
      }
    </div>
  </div>
</div>
