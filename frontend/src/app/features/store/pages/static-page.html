@if (page()) {
  <div class="static-page">
    <header class="static-page__hero">
      <h1 class="static-page__title">{{ page().title }}</h1>
    </header>
    <div class="static-page__content" [innerHTML]="page().content"></div>
  </div>
} @else if (notFound()) {
  <div class="not-found">
    <div class="not-found__code">404</div>
    <h2 class="not-found__title">Page Not Found</h2>
    <p class="not-found__sub">The page you're looking for doesn't exist or has been moved.</p>
    <a routerLink="/" class="not-found__link">← Go Home</a>
  </div>
} @else {
  <div class="loading">
    <div class="spinner"></div>
  </div>
}
